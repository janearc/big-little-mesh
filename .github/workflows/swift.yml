name: swift

# The on-device capability provider (apple-silicon/) is macOS + Apple-Silicon only: it
# needs the Apple frameworks (Speech, AVFoundation, Network) and the on-device Neural
# Engine, on a recent macOS (the macOS 26 SDK). It CANNOT build on the Linux runners the
# rest of CI uses, nor on hosted macOS runners (no ANE, and below our recency bar) -- so
# this lane runs on a SELF-HOSTED macOS runner.
# See apple-silicon/README.md for the toolchain + OS posture and how to register the runner.
#
# Path-filtered so it only fires on Swift changes (it does not gate the Go/Python lanes).

on:
  push:
    paths:
      - "apple-silicon/**"
      - ".swift-format"
      - "Package.swift"
      - ".github/workflows/swift.yml"
  pull_request:
    paths:
      - "apple-silicon/**"
      - ".swift-format"
      - "Package.swift"
      - ".github/workflows/swift.yml"

jobs:
  swift:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: toolchain
        run: swift --version

      # format-lint: the gofmt / ruff equivalent for Swift, against .swift-format.
      - name: format-lint
        run: swift format lint --strict --recursive --configuration .swift-format apple-silicon/Sources apple-silicon/Tests

      - name: build
        run: swift build

      - name: test
        run: swift test
