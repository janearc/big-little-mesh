# Code generation from blm's contracts. Managed mode retargets every proto's
# go_package to blm's module so generated Go lands under gen/go/... with the right
# import paths, without each .proto hard-coding it. Go today; betterproto Python
# is added next (Max: pydantic ergonomics, protobuf wire); Rust the day we want it.
# Generated code IS committed here (unlike services that gitignore gen/) because
# good-citizen is imported as a library -- consumers go get it, they don't regen.
version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/janearc/blm/gen/go
plugins:
  - local: protoc-gen-go
    out: gen/go
    opt: paths=source_relative
  # betterproto: pydantic-flavored Python dataclasses that serialize to protobuf
  # wire (the Confluent-SR framing is added around the payload by the emit layer,
  # same as Go). One contract -> Go and Python, both generated + round-trip
  # verified. NOTE: betterproto v2 is prerelease -- Python consumers must pin
  # `betterproto==2.0.0b7` to match this generated code (the v2 field API differs
  # from stable v1; mismatched runtimes fail to import).
  - local: protoc-gen-python_betterproto
    out: gen/python
    opt: pydantic_dataclasses
